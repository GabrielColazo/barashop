<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - Barago</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://accounts.google.com; img-src 'self' https: data: blob:; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net https://accounts.google.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://accounts.google.com">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><img class="logo-icon" src="assets/img/barago.webp" alt="Barago"></a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <div id="auth-form">
        <h2>Ingresá</h2>
        <p>Entrá con tu email para publicar y gestionar anuncios</p>

        <div id="auth-error" class="d-none mb-3" style="color:#EF4444;font-size:0.875rem;"></div>
        <div id="auth-success" class="d-none mb-3" style="color:#10B981;font-size:0.875rem;"></div>


        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="input-custom" placeholder="tu@email.com" autocomplete="email">
        </div>

        <div class="form-group" id="password-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="input-custom" placeholder="••••••••" autocomplete="current-password" minlength="6">
        </div>

        <button class="btn-primary-custom w-100 justify-content-center mt-3" id="auth-submit" onclick="handleAuth()">
          Ingresar
        </button>

        <div class="divider">o</div>

        <button class="btn-google" onclick="handleGoogle()" id="google-btn">
          <span class="google-icon">G</span>
          Ingresar con Google
        </button>

        <div class="mt-2 text-center" id="magic-link-row">
          <a onclick="handleMagicLink()" style="color:#6B7280;font-size:0.85rem;cursor:pointer;transition:color 0.2s;"
             onmouseover="this.style.color='#059669'" onmouseout="this.style.color='#6B7280'">
            Enviar link mágico
          </a>
        </div>

        <div class="auth-switch">
          ¿No tenés cuenta? <a id="auth-toggle" onclick="toggleAuth()">Registrate</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <script>
    let isLogin = true
    let googleTokenClient = null

    function initGoogle() {
      googleTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: '973809022626-0k8o5hepl6v3o1pjunho87r1ki3107qd.apps.googleusercontent.com',
        scope: 'openid email profile',
        callback: (response) => {
          if (response.error) {
            document.getElementById('auth-error').textContent = 'Error al iniciar con Google'
            document.getElementById('auth-error').classList.remove('d-none')
            return
          }
          handleGoogleIdToken(response.id_token)
        }
      })
    }

    function toggleAuth() {
      isLogin = !isLogin
      document.querySelector('#auth-form h2').textContent = isLogin ? 'Ingresá' : 'Registrate'
      document.querySelector('#auth-form p').textContent = isLogin
        ? 'Entrá con tu email para publicar y gestionar anuncios'
        : 'Creá tu cuenta y empezá a publicar'
      document.getElementById('auth-submit').textContent = isLogin ? 'Ingresar' : 'Crear cuenta'
      document.getElementById('auth-toggle').textContent = isLogin ? 'Registrate' : 'Ingresar'
      document.getElementById('google-btn').innerHTML = `<span class="google-icon">G</span> ${isLogin ? 'Ingresar' : 'Registrarse'} con Google`
      document.getElementById('auth-error').classList.add('d-none')
      document.getElementById('auth-success').classList.add('d-none')
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const errorEl = document.getElementById('auth-error')
      const successEl = document.getElementById('auth-success')

      errorEl.classList.add('d-none')
      successEl.classList.add('d-none')

      if (!email || !password) {
        errorEl.textContent = 'Completá todos los campos'
        errorEl.classList.remove('d-none')
        return
      }

      if (password.length < 6) {
        errorEl.textContent = 'La contraseña debe tener al menos 6 caracteres'
        errorEl.classList.remove('d-none')
        return
      }

      try {
        if (isLogin) {
          await iniciarSesion(email, password)
          window.location.href = 'index.html'
        } else {
          await registrar(email, password)
          successEl.textContent = 'Registro exitoso. Revisá tu email para confirmar la cuenta.'
          successEl.classList.remove('d-none')
        }
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.classList.remove('d-none')
      }
    }

    function handleGoogle() {
      if (googleTokenClient) {
        googleTokenClient.requestAccessToken()
      }
    }

    async function handleGoogleIdToken(idToken) {
      try {
        const { data, error } = await sb.auth.signInWithIdToken({
          provider: 'google',
          token: idToken
        })
        if (error) throw error
        window.location.href = 'https://gabrielcolazo.github.io/barago/publicar.html'
      } catch (err) {
        document.getElementById('auth-error').textContent = err.message
        document.getElementById('auth-error').classList.remove('d-none')
      }
    }

    async function handleMagicLink() {
      const email = document.getElementById('email').value.trim()
      const errorEl = document.getElementById('auth-error')
      const successEl = document.getElementById('auth-success')

      errorEl.classList.add('d-none')
      successEl.classList.add('d-none')

      if (!email) {
        errorEl.textContent = 'Ingresá tu email primero'
        errorEl.classList.remove('d-none')
        return
      }

      try {
        await enviarMagicLink(email)
        successEl.textContent = '📧 Revisá tu email. Llegó un link mágico para ingresar.'
        successEl.classList.remove('d-none')
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.classList.remove('d-none')
      }
    }

    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleAuth()
    })

    initGoogle()
  </script>

  <footer class="footer">
    <div class="container">
      <p class="footer-brand">Barago</p>
      <p class="footer-copy">&copy; 2026 Barago &mdash; Todos los derechos reservados.</p>
      <p class="footer-copy">Desarrollado por <a href="https://www.gaboweb.com.ar" target="_blank" rel="noopener">&lt;GaboWeb/&gt;</a></p>
    </div>
  </footer>
</body>
</html>
